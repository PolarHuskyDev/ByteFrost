name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]   # releases are handled by release.yml
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: Linux
          - os: windows-latest
            name: Windows

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Conan
        run: pip install "conan>=2"

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-${{ runner.os }}-

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install dependencies
        shell: bash
        run: |
          conan install . \
            --output-folder=build/Release \
            --build=missing \
            --settings build_type=Release \
            --settings compiler.cppstd=17

      - name: Install system tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ninja-build lld

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build/Release \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=build/Release/generators/conan_toolchain.cmake \
            -DBF_VERSION=0.0.0-dev

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build\Release `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE=build\Release\generators\conan_toolchain.cmake `
            -DBF_VERSION=0.0.0-dev `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

      - name: Build
        shell: bash
        run: cmake --build build/Release

      - name: Run unit tests
        shell: bash
        run: ./build/Release/unit_tests

      - name: Run E2E tests (Linux only)
        if: runner.os == 'Linux'
        run: bash scripts/test_compiled.sh
